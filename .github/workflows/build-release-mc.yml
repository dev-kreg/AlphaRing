name: Build & Release

on:
  push:
    branches: [master, dev]
    paths-ignore:
      - "**.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -A x64

      - name: Build
        run: cmake --build build --config Release --target WTSAPI32

      - name: Checksum
        run: |
          Get-FileHash build/Release/WTSAPI32.dll -Algorithm SHA256 | Format-List
          (Get-FileHash build/Release/WTSAPI32.dll -Algorithm SHA256).Hash + "  WTSAPI32.dll" | Out-File -Encoding ascii build/Release/WTSAPI32.dll.sha256

      - name: Read game version
        id: ver
        shell: bash
        run: echo "version=$(sed -n 's/^set(VERSION "\(.*\)")/\1/p' CMakeLists.txt)" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WTSAPI32-${{ github.ref_name }}-${{ github.run_number }}
          path: |
            build/Release/WTSAPI32.dll
            build/Release/WTSAPI32.dll.sha256

      - name: Create release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mc-v${{ steps.ver.outputs.version }}-r${{ github.run_number }}
          name: AlphaRing master-chief ${{ steps.ver.outputs.version }} build ${{ github.run_number }}
          prerelease: true
          generate_release_notes: true
          files: |
            build/Release/WTSAPI32.dll
            build/Release/WTSAPI32.dll.sha256
